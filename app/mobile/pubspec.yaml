# app/mobile/pubspec.yaml
name: mobile
description: A Flutter app for English learning with ASR
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.1.0
  file_picker: ^8.1.2
  permission_handler: ^11.3.1
  record: ^6.1.1
  audio_waveforms: ^1.3.0
  lottie: ^3.1.2
  path_provider: ^2.1.3
  flutter_tts: ^3.8.5
  audioplayers: ^6.5.1
  flutter_sound: ^9.28.0
  shared_preferences: ^2.5.3
  speech_to_text: ^6.6.0

  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  http_parser: any
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/recording.json